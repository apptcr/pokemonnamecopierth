<html lang="th">
<head>
<meta charset="UTF-8">

<title>DEX-COPY — รายชื่อโปเกมอนสำหรับใช้คัดลอก by Namjit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --shell:#C41E3A;
    --shell-dark:#8E1428;
    --shell-darker:#5E0D1B;
    --screen:#152219;
    --screen-line:#1E3126;
    --phosphor:#8FE3A8;
    --phosphor-dim:#4F7A5C;
    --cream:#ECE7D8;
    --cream-dark:#D8D0B8;
    --ink:#262620;
    --ink-soft:#5C5A4E;
    --amber:#F4B400;
    --steel:#8B9088;
    --steel-dark:#585D57;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--shell-darker);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.04), transparent 40%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px);
    color:var(--ink);
    font-family:'Chakra Petch', sans-serif;
    min-height:100vh;
    padding:24px 14px 48px;
  }
  .pixel{font-family:'Press Start 2P', monospace;}
  .mono{font-family:'JetBrains Mono', monospace;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  button:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible{
    outline:3px solid var(--amber);
    outline-offset:2px;
  }

  .device{
    max-width:920px;
    margin:0 auto;
    background:var(--shell);
    border:3px solid var(--shell-darker);
    border-radius:18px;
    box-shadow:0 10px 0 var(--shell-darker), 0 14px 24px rgba(0,0,0,0.45);
    padding:18px;
  }

  .screw{
    width:12px;height:12px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #cfd3cf, var(--steel-dark) 70%);
    border:1px solid var(--steel-dark);
    flex-shrink:0;
  }

  .top-row{
    display:flex; align-items:center; gap:14px;
    padding:6px 4px 16px;
  }

  .lens{
    position:relative;
    width:52px; height:52px; border-radius:50%;
    background:radial-gradient(circle at 32% 28%, #d9fbe4 0%, var(--phosphor) 32%, #1f6b45 78%, #0c3722 100%);
    border:3px solid var(--cream);
    box-shadow:0 0 0 3px var(--shell-darker), inset 0 0 6px rgba(0,0,0,0.35);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .lens-count{
    font-family:'JetBrains Mono', monospace;
    font-weight:600;
    font-size:15px;
    color:#0c3722;
    text-shadow:0 1px 0 rgba(255,255,255,0.35);
  }

  .title-block{flex:1; min-width:0;}
  .eyebrow{
    color:#FDE0E4; font-size:10px; letter-spacing:2px;
  }
  .title{
    color:#fff; font-weight:700; font-size:18px; margin-top:4px;
    letter-spacing:0.3px;
  }

  .indicator-strip{display:flex; gap:6px; flex-shrink:0;}
  .ind-dot{width:8px;height:8px;border-radius:50%; background:var(--shell-darker); box-shadow:inset 0 0 0 1px rgba(255,255,255,0.15);}
  .ind-dot.on{background:var(--amber); box-shadow:0 0 4px var(--amber);}

  .screen-panel{
    background:var(--screen);
    border:3px solid var(--shell-darker);
    border-radius:10px;
    padding:16px;
    box-shadow:inset 0 2px 6px rgba(0,0,0,0.6);
    background-image:repeating-linear-gradient(0deg, rgba(143,227,168,0.03) 0px, rgba(143,227,168,0.03) 1px, transparent 1px, transparent 3px);
  }

  .panel-label{
    color:var(--phosphor); font-size:10px; letter-spacing:2px; margin-bottom:12px;
    display:flex; align-items:center; gap:8px;
  }
  .panel-label::before{content:'>'; color:var(--amber);}

  .filter-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
  }
  @media (max-width:640px){ .filter-grid{grid-template-columns:1fr;} }

  .field-label{
    display:block; color:var(--phosphor-dim); font-size:11px; margin-bottom:5px; letter-spacing:0.5px;
  }

  .field{
    width:100%;
    background:#0E1712;
    border:2px solid var(--screen-line);
    color:var(--phosphor);
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    padding:9px 10px;
    border-radius:4px;
    outline:none;
  }
  .field::placeholder{color:var(--phosphor-dim);}
  .field:focus{border-color:var(--phosphor);}
  select.field{appearance:none; -webkit-appearance:none;
    background-image:linear-gradient(45deg, transparent 50%, var(--phosphor) 50%), linear-gradient(135deg, var(--phosphor) 50%, transparent 50%);
    background-position:calc(100% - 16px) center, calc(100% - 11px) center;
    background-size:5px 5px, 5px 5px;
    background-repeat:no-repeat;
  }

  .range-row{display:flex; align-items:center; gap:8px;}
  .range-row .field{text-align:center;}
  .range-dash{color:var(--phosphor-dim); font-size:12px; flex-shrink:0;}

  .reset-link{
    background:none; border:none; cursor:pointer;
    color:var(--amber); font-family:'Chakra Petch', sans-serif; font-weight:600; font-size:12px;
    padding:4px 2px; text-decoration:underline; text-underline-offset:3px;
  }
  .reset-link:hover{color:#ffd35c;}

  .filter-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}

  .content-grid{
    display:grid; grid-template-columns:1.5fr 1fr; gap:14px; margin-top:14px;
  }
  @media (max-width:760px){ .content-grid{grid-template-columns:1fr;} }

  .list-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .count-tag{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:#0c3722;
    background:var(--phosphor); padding:2px 8px; border-radius:3px; font-weight:600;
  }
  .hint{color:var(--phosphor-dim); font-size:10.5px;}

  #pokemonContainer{
    height:340px; overflow-y:auto;
    display:flex; flex-direction:column; gap:6px;
    padding-right:4px;
  }
  #pokemonContainer::-webkit-scrollbar{width:8px;}
  #pokemonContainer::-webkit-scrollbar-track{background:transparent;}
  #pokemonContainer::-webkit-scrollbar-thumb{background:var(--screen-line); border-radius:4px;}

  .poke-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 10px;
    border:1px solid var(--screen-line);
    border-radius:4px;
    background:#0E1712;
    cursor:pointer;
    transition:border-color 0.1s, background 0.1s;
  }
  .poke-row:hover{border-color:var(--phosphor-dim);}
  .poke-row.selected{
    background:#12241A;
    border-color:var(--amber);
    box-shadow:inset 0 0 0 1px var(--amber);
  }
  .poke-id{font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--phosphor-dim); margin-right:10px;}
  .poke-name{color:var(--phosphor); font-weight:600; font-size:13.5px;}
  .poke-left{display:flex; align-items:center; min-width:0;}
  .poke-right{display:flex; align-items:center; gap:8px; flex-shrink:0;}
  .check{color:var(--amber); font-size:12px; font-weight:700;}
  .tag{
    font-family:'JetBrains Mono', monospace; font-size:9.5px; padding:2px 6px; border-radius:3px;
    letter-spacing:0.5px;
  }
  .tag.legend{background:var(--amber); color:#4A2E00;}
  .tag.normal{background:var(--screen-line); color:var(--phosphor-dim);}
  .empty-row{color:var(--phosphor-dim); text-align:center; padding:40px 10px; font-size:13px;}

  .output-col{display:flex; flex-direction:column;}

  .sep-row{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;}
  .sep-btn{
    background:#0E1712; border:1px solid var(--screen-line); color:var(--phosphor-dim);
    font-family:'Chakra Petch', sans-serif; font-size:11px; font-weight:600;
    padding:6px 10px; border-radius:4px; cursor:pointer;
  }
  .sep-btn.active{background:var(--phosphor); color:#0c3722; border-color:var(--phosphor);}

  textarea#copyTextArea{
    width:100%; height:180px; resize:none;
    background:#0E1712; border:2px solid var(--screen-line); border-radius:4px;
    color:var(--phosphor); font-family:'JetBrains Mono', monospace; font-size:12.5px;
    padding:10px; outline:none;
  }
  textarea#copyTextArea:focus{border-color:var(--phosphor);}

  .bottom-cluster{
    background:var(--cream);
    border:3px solid var(--shell-darker);
    border-top:none;
    border-radius:0 0 10px 10px;
    margin-top:-4px;
    padding:16px 18px;
    display:flex; align-items:center; gap:16px;
  }
  @media (max-width:640px){ .bottom-cluster{flex-direction:column; align-items:stretch;} }

  .dpad{
    display:grid; grid-template-columns:repeat(3, 18px); grid-template-rows:repeat(3, 18px); gap:2px;
    flex-shrink:0;
  }
  .dpad span{background:var(--steel-dark); border-radius:2px;}
  .dpad span.mid{background:transparent;}

  .actuator{
    flex:1;
    background:var(--shell);
    color:#fff;
    border:none;
    border-bottom:5px solid var(--shell-darker);
    border-radius:8px;
    font-family:'Chakra Petch', sans-serif; font-weight:700; font-size:14.5px;
    padding:13px 18px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:transform 0.05s;
  }
  .actuator:active{transform:translateY(3px); border-bottom-width:2px;}
  .actuator:disabled{opacity:0.4; cursor:not-allowed;}
  .actuator.done{background:#1D9E75; border-bottom-color:#0F6E56;}

  .toast{
    color:#0F6E56; font-size:12px; font-weight:700; margin-top:8px; text-align:center;
    visibility:hidden;
  }
  .toast.show{visibility:visible;}

  footer.credit{
    text-align:center; color:rgba(255,255,255,0.35); font-size:10.5px; margin-top:14px;
    letter-spacing:0.5px;
  }
</style>
</head>

        <div>

        </div>

        <div>

            <input type="number" id="idEnd" placeholder="1025" min="1" class="field">
          </div>
        </div>

        <div>
          <label for="typeFilter" class="field-label">CLASS</label>
          <select id="typeFilter" class="field">
            <option value="all">ทั้งหมด</option>
            <option value="legendary">เฉพาะระดับตำนาน (Legendary / Mythical)</option>
            <option value="normal">เฉพาะโปเกมอนทั่วไป</option>
          </select>
        </div>
      </div>
    </div>

    <div class="content-grid">
      <div class="screen-panel">
        <div class="list-head">
          <div class="panel-label" style="margin-bottom:0">RESULTS</div>
          <span class="hint">คลิกเพื่อเลือก/ยกเลิก</span>
        </div>
        <div id="pokemonContainer"></div>
      </div>

      <div class="screen-panel output-col">
        <div class="panel-label">OUTPUT FORMAT</div>
        <div class="sep-row" id="sepRow">
          <button type="button" class="sep-btn active" data-sep="newline">บรรทัดใหม่</button>
          <button type="button" class="sep-btn" data-sep="comma">คอมมา</button>
          <button type="button" class="sep-btn" data-sep="pipe">Pipe |</button>
          <button type="button" class="sep-btn" data-sep="tab">Tab</button>
          <button type="button" class="sep-btn" data-sep="quotes">"Quotes"</button>
        </div>
        <textarea id="copyTextArea" readonly placeholder="ไม่มีรายชื่อที่จะคัดลอก..."></textarea>
      </div>
    </div>

    <div class="bottom-cluster">
      <div class="dpad">
        <span></span><span></span><span></span>
        <span></span><span class="mid"></span><span></span>
        <span></span><span></span><span></span>
      </div>
      <div style="flex:1">
        <button id="copyBtn" class="actuator">
          <span id="btnText">คัดลอกรายชื่อทั้งหมด</span>
        </button>
        <p id="toastMsg" class="toast" role="status">คัดลอกลงคลิปบอร์ดแล้ว</p>
      </div>
    </div>

    <footer class="credit pixel">by Namjit</footer>
  </div>

      if (selectedType === 'normal') matchType = poke.isLegendary === false;
      return matchGen && matchID && matchType && matchSearch;
    });

    matchCount.textContent = filteredList.length;
    lens.style.boxShadow = selectedNames.size > 0
      ? '0 0 0 3px var(--shell-darker), 0 0 10px 2px var(--amber)'
      : '0 0 0 3px var(--shell-darker), inset 0 0 6px rgba(0,0,0,0.35)';

    pokemonContainer.innerHTML = '';

    if (filteredList.length === 0) {
      pokemonContainer.innerHTML = '<div class="empty-row">ไม่พบข้อมูลโปเกมอนที่ตรงตามเงื่อนไข ลองปรับตัวกรองดูใหม่</div>';
    } else {
      filteredList.forEach(poke => {
        const isSelected = selectedNames.has(poke.name);
        const pokeEl = document.createElement('div');
        pokeEl.setAttribute('role', 'button');
        pokeEl.setAttribute('tabindex', '0');
        pokeEl.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
        pokeEl.className = 'poke-row' + (isSelected ? ' selected' : '');

        const badge = poke.isLegendary
          ? '<span class="tag legend">LEGEND</span>'
          : '<span class="tag normal">GEN ' + poke.gen + '</span>';

        pokeEl.innerHTML =
          '<div class="poke-left">' +
            '<span class="poke-id">#' + String(poke.id).padStart(3, '0') + '</span>' +
            '<span class="poke-name">' + poke.name + '</span>' +
          '</div>' +
          '<div class="poke-right">' +
            (isSelected ? '<span class="check">✓</span>' : '') +
            badge +
          '</div>';

        const toggleSelection = () => {
          if (selectedNames.has(poke.name)) {
            selectedNames.delete(poke.name);
          } else {
            selectedNames.add(poke.name);
          }
          updateList();
        };

        pokeEl.addEventListener('click', toggleSelection);
        pokeEl.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            toggleSelection();
          }
        });

        pokemonContainer.appendChild(pokeEl);
      });
    }

    filteredPokemonNames = selectedNames.size > 0 ? [...selectedNames] : filteredList.map(p => p.name);
    updateTextBox();
  }

  function updateTextBox() {
    if (filteredPokemonNames.length === 0) {
      copyTextArea.value = '';
      copyBtn.disabled = true;
      btnText.textContent = 'คัดลอกรายชื่อทั้งหมด';
    } else {
      copyBtn.disabled = false;
      btnText.textContent = 'คัดลอก (' + filteredPokemonNames.length + ' ชื่อ)';
      if (currentSeparator === 'comma') {
        copyTextArea.value = filteredPokemonNames.join(', ');
      } else if (currentSeparator === 'pipe') {
        copyTextArea.value = filteredPokemonNames.join('|');
      } else if (currentSeparator === 'tab') {
        copyTextArea.value = filteredPokemonNames.join('\t');
      } else if (currentSeparator === 'quotes') {
        copyTextArea.value = filteredPokemonNames.map(n => '"' + n + '"').join(', ');
      } else {
        copyTextArea.value = filteredPokemonNames.join('\n');
      }
    }
  }

  genFilter.addEventListener('change', updateList);
  idStart.addEventListener('input', updateList);
  idEnd.addEventListener('input', updateList);
  typeFilter.addEventListener('change', updateList);
  searchInput.addEventListener('input', updateList);

  sepButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      sepButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSeparator = btn.dataset.sep;
      updateTextBox();
    });
  });

  resetBtn.addEventListener('click', () => {
    genFilter.value = 'all';
    idStart.value = '';
    idEnd.value = '';
    typeFilter.value = 'all';
    searchInput.value = '';
    selectedNames.clear();
    updateList();
  });

  copyBtn.addEventListener('click', () => {
    if (copyTextArea.value.trim() === '') return;

    const showSuccess = () => {
      toastMsg.classList.add('show');
      const originalText = btnText.textContent;
      btnText.textContent = 'คัดลอกสำเร็จแล้ว';
      copyBtn.classList.add('done');

      setTimeout(() => {
        toastMsg.classList.remove('show');
        btnText.textContent = originalText;
        copyBtn.classList.remove('done');
      }, 2000);
    };

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(copyTextArea.value).then(showSuccess).catch(err => {
        alert('เกิดข้อผิดพลาดในการคัดลอก: ' + err);
      });
    } else {
      try {
        copyTextArea.removeAttribute('readonly');
        copyTextArea.select();
        document.execCommand('copy');
        copyTextArea.setAttribute('readonly', true);
        showSuccess();
      } catch (err) {
        alert('เบราว์เซอร์นี้ไม่รองรับการคัดลอกอัตโนมัติ กรุณาคัดลอกข้อความด้วยตนเอง');
      }
    }
  });

  updateList();
</script>
</body>
</html>
